version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: law-digital-human-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./data:/app/shared_data
    environment:
      - APP_NAME=law-digital-human-backend
      - ENV=production
      - QDRANT_URL=http://qdrant:6333
      - KNOWLEDGE_DB_PATH=/app/shared_data/knowledge.db
      - METRICS_DB_PATH=/app/shared_data/metrics.db
      - TTS_AUDIO_STORE_DIR=/app/shared_data/tts_cache
      - ASR_AUDIO_STORE_DIR=/app/shared_data/asr_uploads
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: law-digital-human-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  # 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: law-digital-human-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
