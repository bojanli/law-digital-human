server {
    listen 80;
    server_name localhost;

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Unity WebGL 静态资源特殊处理 (支持 .gz 压缩文件)
    location ~* \.(data|js|wasm)\.gz$ {
        root /usr/share/nginx/html;
        add_header Content-Encoding gzip;
        # 根据后缀设置对应的 Content-Type
        if ($request_filename ~* \.data\.gz$) {
            add_header Content-Type application/octet-stream;
        }
        if ($request_filename ~* \.js\.gz$) {
            add_header Content-Type application/javascript;
        }
        if ($request_filename ~* \.wasm\.gz$) {
            add_header Content-Type application/wasm;
        }
    }

    # 代理后端 API
    location /api {
        proxy_pass http://backend:8000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 代理后端 Health check
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # 代理后端静态文件（如 TTS 缓存）
    location /data/tts_cache {
        proxy_pass http://backend:8000/data/tts_cache;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
